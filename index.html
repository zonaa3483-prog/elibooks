<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mir.az Kloni - Kitab Yükləmə</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="logo">
                <img src="https://mir.az/uploads/settings/logo.png" alt="Logo"> 
                <span>Mir.az</span>
            </div>
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Son Yüklənənlər</h2>
        
        <div class="book-grid">
            <div class="book-card">
                <div class="badge">PREMİUM</div>
                <div class="book-image">
                    <img src="https://mir.az/uploads/books/1713876000_celik-kral.jpg" alt="Polad Kral">
                </div>
                <div class="book-info">
                    <h3>Devney Perry "Polad Kral" PDF</h3>
                    <p class="genre">Roman</p>
                    <div class="stats">
                        <span><i class="fas fa-star"></i> 0</span>
                        <span><i class="fas fa-eye"></i> 133</span>
                    </div>
                </div>
            </div>

            <div class="book-card">
                <div class="badge">PREMİUM</div>
                <div class="book-image">
                    <img src="https://mir.az/uploads/books/the-gray-man.jpg" alt="The Gray Man">
                </div>
                <div class="book-info">
                    <h3>Mark Greaney "The Gray Man" PDF</h3>
                    <p class="genre">Roman</p>
                    <div class="stats">
                        <span><i class="fas fa-star"></i> 0</span>
                        <span><i class="fas fa-eye"></i> 81</span>
                    </div>
                </div>
            </div>

            <div class="book-card">
                <div class="badge">PREMİUM</div>
                <div class="book-image">
                    <img src="https://mir.az/uploads/books/surlar-ve-olum.jpg" alt="Surlar və Ölüm">
                </div>
                <div class="book-info">
                    <h3>Sabaa Tahir "Surlar ve Ölüm" PDF</h3>
                    <p class="genre">Roman</p>
                    <div class="stats">
                        <span><i class="fas fa-star"></i> 1</span>
                        <span><i class="fas fa-eye"></i> 442</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="floating-controls">
        <div class="lang-box"><img src="https://flagcdn.com/w20/az.png" alt="AZ"> AZ</div>
        <div class="dark-mode-btn"><i class="fas fa-moon"></i></div>
    </div>

</body>
</html>
