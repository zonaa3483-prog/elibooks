<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 Canlı Yayım Oxuyucu</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        video { width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: black; }
        .status { margin-top: 10px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>M3U8 / HLS Player</h2>
    
    <div class="controls">
        <input type="text" id="streamUrl" placeholder="Bura .m3u8 və ya yayım linkini yapışdırın...">
        <button onclick="loadStream()">OXUT</button>
    </div>

    <video id="video" controls autocomplete="off"></video>
    <div id="status" class="status">Gözlənilir...</div>
</div>

<script>
    function loadStream() {
        const video = document.getElementById('video');
        const streamUrl = document.getElementById('streamUrl').value.trim();
        const status = document.getElementById('status');

        if (!streamUrl) {
            alert("Zəhmət olmasa bir link daxil edin!");
            return;
        }

        status.innerText = "Yayım yüklənir...";

        // Brauzer HLS-i birbaşa dəstəkləyirsə (Məsələn: Safari)
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
                status.innerText = "Yayım başladı (Native)";
            });
        } 
        // Digər brauzerlər üçün Hls.js kitabxanası
        else if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
                status.innerText = "Yayım başladı (HLS.js)";
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    status.innerText = "Xəta: Link düzgün deyil və ya yayım aktiv deyil.";
                }
            });
        } else {
            status.innerText = "Brauzeriniz bu texnologiyanı dəstəkləmir.";
        }
    }
</script>

</body>
</html>
