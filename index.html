<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mir.az Oxşarı - Kitab Portalı</title>
    <style>
        :root {
            --primary-color: #5cb85c;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        /* Header */
        header {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo { color: var(--primary-color); font-weight: bold; font-size: 24px; }

        /* Grid Sistemi */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .book-card h3 { font-size: 16px; margin: 10px; color: #333; }

        .btn-detail {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Modal (Böyük Pəncərə) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .close-btn {
            position: absolute;
            right: 15px; top: 10px;
            font-size: 24px; cursor: pointer;
        }

        .download-btn {
            display: block;
            background: #27ae60;
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Kitab Əlavə Etmə Forması */
        .add-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 40px;
            border: 2px dashed var(--primary-color);
        }

        .add-section input, .add-section textarea {
            width: 100%; margin: 5px 0; padding: 8px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Mir.az <small style="color:gray; font-size:12px">Klon</small></div>
    <button onclick="document.getElementById('add-form').scrollIntoView()" class="btn-detail">Yeni Kitab +</button>
</header>

<div class="book-grid" id="bookGrid">
    </div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="m-title">Kitab Adı</h2>
        <p><strong>Müəllif:</strong> <span id="m-author"></span></p>
        <p><strong>Janr:</strong> <span id="m-genre"></span></p>
        <p><strong>Dil:</strong> <span id="m-lang"></span></p>
        <hr>
        <p id="m-desc">Məlumat burada görünəcək...</p>
        <a id="m-link" href="#" class="download-btn" download>Kitabı Yüklə (PDF)</a>
    </div>
</div>

<div class="add-section" id="add-form">
    <h3>Yeni Kitab Əlavə Et</h3>
    <input type="text" id="in-title" placeholder="Kitabın adı">
    <input type="text" id="in-author" placeholder="Müəllif">
    <input type="text" id="in-genre" placeholder="Janr">
    <input type="text" id="in-lang" placeholder="Dil">
    <input type="text" id="in-img" placeholder="Şəkil linki (URL)">
    <input type="text" id="in-pdf" placeholder="PDF yükləmə linki">
    <textarea id="in-desc" placeholder="Kitab haqqında qısa məlumat"></textarea>
    <button class="btn-detail" style="width:100%" onclick="addNewBook()">Siyahıya Əlavə Et</button>
</div>

<script>
    // İlkin 10 kitab bazası
    let books = [
        {title: "Polad Kral", author: "Devney Perry", genre: "Roman", lang: "Azərbaycan", desc: "Ehtiras və güc haqqında maraqlı bir hekayə.", img: "https://via.placeholder.com/200x280", link: "#"},
        {title: "The Gray Man", author: "Mark Greaney", genre: "Triller", lang: "Türk", desc: "Peşəkar bir qatilin həyatından bəhs edir.", img: "https://via.placeholder.com/200x280", link: "#"},
        {title: "Surlar ve Ölüm", author: "Sabaa Tahir", genre: "Fantastika", lang: "Türk", desc: "Qədim imperiya və mübarizə.", img: "https://via.placeholder.com/200x280", link: "#"}
        // Bura daha 7 dənə oxşar obyekt əlavə edib 10-a tamamlaya bilərsiniz
    ];

    const grid = document.getElementById('bookGrid');

    // Kitabları ekrana çıxarmaq
    function displayBooks() {
        grid.innerHTML = "";
        books.forEach((book, index) => {
            grid.innerHTML += `
                <div class="book-card">
                    <img src="${book.img}" alt="book">
                    <h3>${book.title}</h3>
                    <p style="color:gray">${book.genre}</p>
                    <button class="btn-detail" onclick="openModal(${index})">Ətraflı</button>
                </div>
            `;
        });
    }

    // Modal açmaq
    function openModal(index) {
        const b = books[index];
        document.getElementById('m-title').innerText = b.title;
        document.getElementById('m-author').innerText = b.author;
        document.getElementById('m-genre').innerText = b.genre;
        document.getElementById('m-lang').innerText = b.lang;
        document.getElementById('m-desc').innerText = b.desc;
        document.getElementById('m-link').href = b.link;
        document.getElementById('bookModal').style.display = "flex";
    }

    function closeModal() {
        document.getElementById('bookModal').style.display = "none";
    }

    // Yeni kitab əlavə etmək
    function addNewBook() {
        const newBook = {
            title: document.getElementById('in-title').value,
            author: document.getElementById('in-author').value,
            genre: document.getElementById('in-genre').value,
            lang: document.getElementById('in-lang').value,
            img: document.getElementById('in-img').value || "https://via.placeholder.com/200x280",
            link: document.getElementById('in-pdf').value,
            desc: document.getElementById('in-desc').value
        };

        if(newBook.title) {
            books.push(newBook);
            displayBooks();
            alert("Kitab uğurla əlavə edildi!");
        } else {
            alert("Zəhmət olmasa kitab adını qeyd edin.");
        }
    }

    // İlk işə salma
    displayBooks();

    // Pəncərə kənarına basanda modalı bağla
    window.onclick = function(event) {
        if (event.target == document.getElementById('bookModal')) closeModal();
    }
</script>

</body>
</html>
