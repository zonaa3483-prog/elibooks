<div class="playlist-section">
    <h3>🎬 Kinolar</h3>
    <button onclick="playYT('PLasdfghjkl123')">Döyüş Kinoları</button>
    <button onclick="playYT('PLqwertyuiop456')">Komediya Filmləri</button>
</div>

<div class="playlist-section">
    <h3>🎞️ Seriallar</h3>
    <button onclick="playYT('PLzxcvbnm789')">Kurtlar Vadisi</button>
</div>

<div class="playlist-section">
    <h3>🌐 IPTV (M3U)</h3>
    <button onclick="playM3U('https://kanal-linki.com/live/playlist.m3u8')">Xəzər TV Canlı</button>
</div>

<script>
    // YouTube funksiyasını bu şəkildə yenilə (link strukturunu düzəltdim)
    function playYT(playlistID) {
        playerBox.innerHTML = `
            <iframe id="yt-player" 
                src="https://youtube.com/playlist?list=PLVbTLpECk_CsYDaCu8f98Vt6-s8taESp7=${playlistID}&autoplay=1&loop=1&playlist=${playlistID}" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>`;
        statusText.innerText = "Hazırda yayım: YouTube Pleylist";
    }

    // M3U funksiyası eynidir
    function playM3U(url) {
        playerBox.innerHTML = `
            <video id="video" controls autoplay style="width:100%; height:100%;">
                <source src="${url}" type="application/x-mpegURL">
                Brauzeriniz HLS (.m3u8) dəstəkləmir.
            </video>`;
        statusText.innerText = "Hazırda yayım: M3U Canlı Kanal";
    }
</script>
