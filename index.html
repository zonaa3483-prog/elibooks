<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Kartın ümumi dizaynı */
        .card {
            width: 180px; /* Ehtiyaca görə dəyişə bilərsən */
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: sans-serif;
            margin: 10px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* ŞƏKİL HİSSƏSİ - Problemin həlli buradadır */
        .card img {
            width: 100%;
            height: 220px; /* Sabit hündürlük */
            object-fit: contain; /* Şəkli kəsmədən, tam sığdırır */
            background-color: #f8f9fa; /* Şəkil tam sığanda boş qalan yerlərin rəngi */
            display: block;
        }

        /* İnformasiya hissəsi */
        .info {
            padding: 10px;
            text-align: center;
            flex-grow: 1; /* Yazı az olsa belə düyməni aşağıda saxlayır */
        }

        .author {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .name {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        /* Düymə hissəsi */
        .card-btn {
            background-color: #f1f1f1;
            color: #28a745;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="card" onclick="openBook('Əli Məhərrəmov', 'Qəlb Yarası', 'https://ia601906.us.archive.org/35/items/elimeherremovofc-highlight-18279034543106991-webp-0/elimeherremovofc%20-%20highlight_18279034543106991%28WEBP%29_0.jpg', 'pdf_linki.pdf', 'Dram', 'Az', 'Açıqlama mətni...')">
    <img src="https://ia601906.us.archive.org/35/items/elimeherremovofc-highlight-18279034543106991-webp-0/elimeherremovofc%20-%20highlight_18279034543106991%28WEBP%29_0.jpg" alt="Kitab">
    
    <div class="info">
        <div class="author">Əli Məhərrəmov</div>
        <div class="name">"Qəlb Yarası"</div>
    </div>
    
    <div class="card-btn">ƏTRAFLI BAX</div>
</div>

<script>
    function openBook(author, name, img, pdf, genre, lang, desc) {
        console.log("Kitab açılır:", name);
        // Bura klikləndikdə baş verəcək funksiyanı yaza bilərsən
    }
</script>

</body>
</html>
