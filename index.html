<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Portalı - Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-bg: #d1c4a9;
            --card-bg: #e6dcc6;
            --header-bg: #8b7355;
            --accent: #d4af37;
            --text-color: #4a3c28;
            --nav-bg: #f8f1e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 80px;
        }

        header {
            display: none; 
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
            padding-top: 25px;
        }

        .book-card {
            background: var(--card-bg);
            border: 2px solid #bba685;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .book-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid #bba685;
        }

        .badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--accent);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        .book-info { padding: 8px; text-align: center; }
        .book-info h3 { font-size: 13px; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #fdf5e6;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
        }

        .modal-header-nav {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            background: #fdf5e6;
            z-index: 10;
        }

        .modal-body { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 120px; }

        .modal-img {
            width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .extra-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
            text-align: center;
            background: rgba(139, 115, 85, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .info-item span { display: block; font-size: 12px; color: #8b7355; }
        .info-item b { font-size: 14px; }

        .download-btn-fixed {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: #27ae60;
            color: white;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
            z-index: 2100;
        }

        .page { display: none; padding: 15px; }
        .active-page { display: block; }

        .profile-header { text-align: center; padding: 20px 0; }
        .author-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; }
        
        .author-books-list { list-style: none; padding: 0; }
        .author-books-list li {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 2px solid #e0d5c1;
            z-index: 1000;
        }

        .nav-item { text-align: center; color: #8b7355; cursor: pointer; font-size: 12px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        #searchInput { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--header-bg); box-sizing: border-box; }
        
        /* Axtarış zamanı görünəcək yer */
        #searchResultContainer { margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Kitablar</h1>
    </header>

    <div id="home-page" class="page active-page">
        <div class="book-grid" id="mainGrid">
            <div class="book-card" onclick="openDetails('Cinayət və Cəza', 'Fyodor Dostoyevski', 'Klassik Roman', 'Raskolnikov adlı gəncin mənəvi iztirabları...', 'https://m.media-amazon.com/images/I/71O2XIyigWL.jpg', 'https://ia800305.us.archive.org/15/items/CrimeAndPunishment_201602/Crime%20and%20Punishment.pdf', 'Azərbaycanca', '1866', '672')">
                <div class="badge">S3</div>
                <img src="https://m.media-amazon.com/images/I/71O2XIyigWL.jpg" alt="Kitab">
                <div class="book-info">
                    <h3>Cinayət və Cəza</h3>
                    <div style="color:#f39c12; font-size: 10px;">★★★★★</div>
                </div>
            </div>

            <div class="book-card" onclick="openDetails('Qisas', 'Əli Məhərrəmov', 'Sevgi, Dram', 'Hekayənin əsas obrazını Xədicə adlı gənc qız təşkil edir. Xədicə məktəbi bitirdikdən sonra, universitetə qəbul olur. Oxuduğu müddət ərzində Əli adlı bir oğlana aşiq olur. Əli də bu qızı ilk görən gündən sevir və öz hisslərini açıb Xədicəylə bölüşür Xədicə də heç tərəddüd etmədən bu təkliflə razılaşır. İki aşiq xoşbəxtlik içində yaşayıb vaxt keçirərkən Xədicənin unutduğu tək şey onun göbək kəsti edildiyi oğlan Murad olacaqdır. Hələ heç bir şeydən xəbəri olmayan Murad Xədicənin ona üz verməməsindən və hərəkətlərinin ona qarşı pis olduğunu görüb bu işdən xəbər tutacaqdır. Xədicənin halı Muradın qurduğu planlar iki aşiqin xoşbəxt yaşamasına və birlikdə vaxt keçirməsinə əngəl olacaqdır!', 'https://dn710107.ca.archive.org/0/items/elimeherremovofc-highlight-18279034543106991-webp-1/elimeherremovofc%20-%20highlight_18279034543106991%28WEBP%29_1.jpg', 'https://www.mediafire.com/file/aj1zv16rcrcq2xc/Qisas_2023_%2528%25C6%258Fli_M%25C9%2599h%25C9%2599rr%25C9%2599mov%2529.pdf/file', 'Azərbaycanca', '1862', '1200')">
                <div class="badge">S5</div>
                <img src="https://dn710107.ca.archive.org/0/items/elimeherremovofc-highlight-18279034543106991-webp-1/elimeherremovofc%20-%20highlight_18279034543106991%28WEBP%29_1.jpg" alt="Kitab">
                <div class="book-info">
                    <h3>Qisas</h3>
                    <div style="color:#f39c12; font-size: 10px;">★★★★☆</div>
                </div>
            </div>

            <div class="book-card" onclick="openDetails('Qəlb Yarası', 'Əli Məhərrəmov', 'Şeir, Dram', 'Qəlb Yarası Əli Məhərrəmov tərəfindən yazılmış şeirlər kitabıdır. Kitabda nakam sevgi, puç olan məhəbbət, ailə və yaradan mövzusunda yazılmış gözəl şeirlər yer alır. Kitabda əsas mövzu məhəbbət üzərində qurulmuşdur. Bu kitabda ümumilikdə 200 şeir yer alır. Kitab 2018-ci ildə Əli Məhərrəmov tərəfindən yazılmışdır. Kitab 2023-cü ildə nəşr olunmuşdur. Xoş oxumalar.', 'https://ia902900.us.archive.org/22/items/elimeherremovofc-highlight-18279034543106991-webp-0_202604/elimeherremovofc%20-%20highlight_18279034543106991%28WEBP%29_0.jpg', 'https://www.mediafire.com/file/kmkldzugih4xvwn/Q%25C9%2599lb_Yaras%25C4%25B1_2018_%25281-200%2529.pdf/file?dkey=9f02nb98che&r=1722', 'Azərbaycan', '2018', '340')">
                <div class="badge">Premium</div>
                <img src="https://ia902900.us.archive.org/22/items/elimeherremovofc-highlight-18279034543106991-webp-0_202604/elimeherremovofc%20-%20highlight_18279034543106991%28WEBP%29_0.jpg" alt="Kitab">
                <div class="book-info">
                    <h3>Qəlb Yarası</h3>
                    <div style="color:#f39c12; font-size: 10px;">★★★★★</div>
                </div>
            </div>
        </div>
    </div>

    <div id="search-page" class="page">
        <div style="padding: 20px;">
            <input type="text" id="searchInput" placeholder="Kitab adı yazın..." onkeyup="searchFunction()">
            <div id="searchResultContainer"></div>
            <p id="noResult" style="display:none; text-align:center; margin-top:20px;">Kitab tapılmadı.</p>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="profile-header" id="authorData"></div>
        <hr>
        <h3>Məşhur Kitabları</h3>
        <ul class="author-books-list" id="authorBooks"></ul>
    </div>

    <div id="bookModal" class="modal">
        <div class="modal-header-nav">
            <i class="fas fa-arrow-left" onclick="closeDetails()" style="font-size: 20px; cursor: pointer;"></i>
            <span style="font-weight: bold;">Kitab Təfərrüatı</span>
            <i class="fas fa-share-alt" style="font-size: 20px; color: var(--accent);"></i>
        </div>
        
        <div class="modal-body">
            <img id="modal-img" src="" class="modal-img" alt="Kapak">
            <h2 id="modal-title" class="modal-title-main">Kitab Adı</h2>
            
            <div class="modal-meta">
                <p><strong><i class="fas fa-user"></i> Müəllif:</strong> <span id="modal-author">...</span></p>
                <p><strong><i class="fas fa-tag"></i> Janr:</strong> <span id="modal-genre">...</span></p>
            </div>

            <div class="extra-info-grid">
                <div class="info-item"><span>Dil</span><b id="modal-lang">...</b></div>
                <div class="info-item"><span>İl</span><b id="modal-year">...</b></div>
                <div class="info-item"><span>Səhifə</span><b id="modal-pages">...</b></div>
            </div>
            
            <div class="modal-desc-box">
                <h3>Haqqında:</h3>
                <p id="modal-desc"></p>
            </div>
        </div>

        <a id="modal-download" href="" target="_blank" class="download-btn-fixed">
            <i class="fas fa-download"></i> PDF OXU / YÜKLƏ
        </a>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home-page', 'Kitablar', this)">
            <i class="fas fa-book"></i><span>Kitablar</span>
        </div>
        <div class="nav-item" onclick="showPage('search-page', 'Axtarış', this)">
            <i class="fas fa-search"></i><span>Axtarış</span>
        </div>
        <div class="nav-item" onclick="showPage('profile-page', 'Müəllif', this)">
            <i class="fas fa-user-circle"></i><span>Müəllif</span>
        </div>
    </nav>

    <script>
        const authorDB = {
            name: "Əli Məhərrəmov",
            title: "Yazıçı & Şair",
            image: "https://upload.wikimedia.org/wikipedia/commons/e/e6/Victor_Hugo_by_Etienne_Carjat_1876_-_full.jpg",
            stats: { works: "5", readers: "10M" },
            topBooks: ["Sənsizlik", "Dedektiv Con", "Qisas 2023", "Qəlb Yarası 2018"]
        };

        function loadAuthorData() {
            const header = document.getElementById('authorData');
            header.innerHTML = `
                <img src="${authorDB.image}" class="author-img" alt="Müəllif">
                <h2>${authorDB.name}</h2>
                <p>${authorDB.title}</p>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
                    <span><strong>${authorDB.stats.works}</strong><br>Əsər</span>
                    <span><strong>${authorDB.stats.readers}</strong><br>Oxucu</span>
                </div>
            `;

            const list = document.getElementById('authorBooks');
            list.innerHTML = authorDB.topBooks.map(book => `
                <li><span>${book}</span> <i class="fas fa-chevron-right"></i></li>
            `).join('');
        }

        window.onload = loadAuthorData;

        function showPage(pageId, title, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(element) element.classList.add('active');

            // Əgər Ana Səhifəyə qayıdırıqsa, grid-i geri qaytar və hamısını göstər
            if(pageId === 'home-page') {
                const mainGrid = document.getElementById('mainGrid');
                document.getElementById('home-page').appendChild(mainGrid);
                const cards = mainGrid.getElementsByClassName('book-card');
                for (let card of cards) {
                    card.style.display = "block";
                }
                document.getElementById('searchInput').value = "";
                document.getElementById('noResult').style.display = "none";
            }
        }

        function searchFunction() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let mainGrid = document.getElementById('mainGrid');
            let resultContainer = document.getElementById('searchResultContainer');
            let noResult = document.getElementById('noResult');
            
            // Axtarış başlayanda grid-i axtarış konteynerinə köçür
            if (input !== "") {
                resultContainer.appendChild(mainGrid);
            }

            let cards = mainGrid.getElementsByClassName('book-card');
            let foundAny = false;

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('h3').innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "block";
                    foundAny = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            noResult.style.display = (input !== "" && !foundAny) ? "block" : "none";
            
            // Input boşdursa, kitabları gizlə (axtarış səhifəsində təmizlik üçün)
            if (input === "") {
                for (let card of cards) card.style.display = "none";
            }
        }

        function openDetails(title, author, genre, desc, imgSrc, pdf, lang, year, pages) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-author').innerText = author;
            document.getElementById('modal-genre').innerText = genre;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('modal-download').href = pdf;
            
            document.getElementById('modal-lang').innerText = lang;
            document.getElementById('modal-year').innerText = year;
            document.getElementById('modal-pages').innerText = pages;
            
            document.getElementById('bookModal').style.display = "block";
            document.body.style.overflow = "hidden"; 
        }

        function closeDetails() {
            document.getElementById('bookModal').style.display = "none";
            document.body.style.overflow = "auto";
        }
    </script>
</body>
</html>
