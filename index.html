<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Portalı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #eef2f5;
            --card: #ffffff;
            --text: #333;
            --green: #28a745;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        body.dark-mode {
            --bg: #1a222d;
            --card: #242f3d;
            --text: #fff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            transition: 0.3s;
            overflow-x: hidden;
        }

        /* Kitab Şəbəkəsi */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            padding: 8px;
            box-sizing: border-box;
            border-radius: 18px;
        }

        .info {
            padding: 8px;
            text-align: center;
        }

        .author { font-weight: bold; font-size: 13px; margin-bottom: 3px; }
        .name { font-size: 11px; opacity: 0.8; }

        /* MODAL (Ətraflı Bölməsi) */
        .modal {
            display: none; /* İlkin olaraq gizli */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--modal-overlay);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card);
            width: 90%;
            max-width: 380px;
            border-radius: 25px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text);
        }

        .modal-img {
            width: 140px;
            height: 200px;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .detail-table {
            margin-top: 15px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(128,128,128,0.2);
        }

        .row:last-child { border-bottom: none; }

        .label { color: #888; font-size: 14px; }
        .val { font-weight: bold; color: var(--green); font-size: 14px; }

        .dl-btn {
            display: block;
            background: var(--green);
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        /* Gecə rejimi düyməsi */
        .theme-btn {
            position: fixed;
            bottom: 20px; right: 20px;
            background: #333; color: white;
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="grid">
    
    <div class="card" onclick="showBook('Əli Məhərrəmov', 'Sənsizlik', '1.jpg', '1.pdf', 'Sevgi', 'Azərbaycan')">
        <img src="1.jpg" alt="Kitab">
        <div class="info">
            <div class="author">Əli Məhərrəmov</div>
            <div class="name">"Sənsizlik" PDF</div>
        </div>
    </div>

    <div class="card" onclick="showBook('Əli Məhərrəmov', 'Dedektiv Con', '2.jpg', '2.pdf', 'Dedektiv', 'Azərbaycan')">
        <img src="2.jpg" alt="Kitab">
        <div class="info">
            <div class="author">Əli Məhərrəmov</div>
            <div class="name">"Dedektiv Con" PDF</div>
        </div>
    </div>

</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeBook()">&times;</span>
        
        <img id="bookImg" src="" class="modal-img">
        <h3 id="bookTitle" style="text-align:center; margin: 10px 0;"></h3>

        <div class="detail-table">
            <div class="row">
                <span class="label">Müəllif:</span>
                <span id="bookAuthor" class="val"></span>
            </div>
            <div class="row">
                <span class="label">Janr:</span>
                <span id="bookGenre" class="val"></span>
            </div>
            <div class="row">
                <span class="label">Dil:</span>
                <span id="bookLang" class="val"></span>
            </div>
        </div>

        <a id="bookLink" href="#" download class="dl-btn">Endirmək üçün vurun</a>
    </div>
</div>

<div class="theme-btn" onclick="document.body.classList.toggle('dark-mode')">
    <i class="fas fa-moon"></i>
</div>

<script>
    // Kitabı açmaq funksiyası
    function showBook(author, title, img, pdf, genre, lang) {
        document.getElementById('bookTitle').innerText = title;
        document.getElementById('bookAuthor').innerText = author;
        document.getElementById('bookGenre').innerText = genre;
        document.getElementById('bookLang').innerText = lang;
        document.getElementById('bookImg').src = img;
        document.getElementById('bookLink').href = pdf;
        
        // Modal pəncərəni göstər
        document.getElementById('myModal').style.display = 'flex';
        
        // Səhifənin arxada sürüşməsini dayandır
        document.body.style.overflow = 'hidden';
    }

    // Kitabı bağlamaq funksiyası
    function closeBook() {
        document.getElementById('myModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Kənara basanda bağlansın
    window.onclick = function(event) {
        let modal = document.getElementById('myModal');
        if (event.target == modal) {
            closeBook();
        }
    }
</script>

</body>
</html>
