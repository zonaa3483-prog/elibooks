<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Yükləmə Portalı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="page-title">Kitab rəfi</h1>
    </header>

    <main id="home-page" class="content-section">
        <div class="book-grid">
            <div class="book-card" onclick="showDetails('Cinayət və Cəza', 'Fyodor Dostoyevski', 'Psixoloji Roman', 'Dünya klassikasının ən nadir incilərindən biri olan bu əsər...', 'book1.pdf')">
                <img src="https://via.placeholder.com/150x200" alt="Kitab">
                <h3>Cinayət və Cəza</h3>
                <p>Fyodor Dostoyevski</p>
            </div>
            <div class="book-card" onclick="showDetails('1984', 'George Orwell', 'Distopiya', 'Böyük Qardaş səni izləyir! Azadlığın məhdudlaşdırıldığı bir dünya...', 'book2.pdf')">
                <img src="https://via.placeholder.com/150x200" alt="Kitab">
                <h3>1984</h3>
                <p>George Orwell</p>
            </div>
            </div>
    </main>

    <section id="author-page" class="content-section hidden">
        <h2>Məşhur Müəlliflər</h2>
        <ul class="author-list">
            <li>Fyodor Dostoyevski</li>
            <li>George Orwell</li>
            <li>Nizami Gəncəvi</li>
        </ul>
    </section>

    <section id="details-page" class="content-section hidden">
        <div class="details-container">
            <button onclick="showHome()" class="back-btn">← Geri qayıt</button>
            <h2 id="det-title"></h2>
            <p><strong>Müəllif:</strong> <span id="det-author"></span></p>
            <p><strong>Janr:</strong> <span id="det-genre"></span></p>
            <div class="description">
                <strong>Haqqında:</strong>
                <p id="det-desc"></p>
            </div>
            <a id="download-link" href="#" download class="download-btn">PDF Yüklə</a>
        </div>
    </section>

    <nav class="bottom-nav">
        <button onclick="showHome()">Ana Səhifə (Kitablar)</button>
        <button onclick="showAuthors()">Müəlliflər</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
