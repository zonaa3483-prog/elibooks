<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mir.az - Kitab Kloni</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #eef2f5; /* Şəkildəki açıq boz fon */
            --card-bg: #ffffff;
            --text: #333;
            --green: #28a745;
            --gray-text: #888;
        }

        body.dark-mode {
            --bg: #1a222d;
            --card-bg: #242f3d;
            --text: #fff;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            transition: 0.3s;
        }

        /* Kitab Şəbəkəsi (Grid) */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Şəkildəki kimi yan-yana 2 dənə */
            gap: 15px;
            padding: 15px;
        }

        /* Kitab Kartı - Şəkildəki eyni dizayn */
        .book-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .book-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            padding: 10px;
            border-radius: 20px; /* Şəkilin öz kənarları */
        }

        .book-content {
            padding: 10px;
            text-align: center;
        }

        .author {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .book-name {
            font-size: 13px;
            margin-bottom: 5px;
        }

        .genre {
            color: #8ed081; /* Şəkildəki yaşıl rəngli yazı */
            font-size: 11px;
            margin-bottom: 10px;
        }

        /* Alt statistika bölməsi (Ulduz və Baxış) */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: var(--gray-text);
        }

        .stats div i {
            display: block;
            margin-bottom: 3px;
            font-size: 16px;
        }

        .fa-star { color: #fbc02d; }
        .fa-eye { color: var(--green); }

        /* Endirmə Düyməsi */
        .download-btn {
            background: var(--green);
            color: white;
            text-decoration: none;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 0 0 15px 15px;
            text-align: center;
        }

        /* Mövzu dəyişən (Ay düyməsi) */
        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="book-grid">
    
    <div class="book-card">
        <img src="https://mir.az/uploads/posts/2023-07/1688506591_sansizliq.jpg" alt="Kitab">
        
        <div class="book-content">
            <div class="author">Əli Məhərrəmov</div>
            <div class="book-name">"Sənsizlik" PDF</div>
            <div class="genre">Sevgi | Qısa məzmunlar</div>
        </div>

        <div class="stats">
            <div><i class="fas fa-star"></i> 11</div>
            <div><i class="fas fa-eye"></i> 350</div>
        </div>
        
        <a href="#" class="download-btn">YÜKLƏ / ENDİR</a>
    </div>

    <div class="book-card">
        <img src="https://mir.az/uploads/posts/2023-07/1688506163_dedektiv-con.jpg" alt="Kitab">
        
        <div class="book-content">
            <div class="author">Əli Məhərrəmov</div>
            <div class="book-name">"Dedektiv Con" PDF</div>
            <div class="genre">Dedektiv | Qorxu | Triller</div>
        </div>

        <div class="stats">
            <div><i class="fas fa-star"></i> 40</div>
            <div><i class="fas fa-eye"></i> 915</div>
        </div>
        
        <a href="#" class="download-btn">YÜKLƏ / ENDİR</a>
    </div>

</div>

<div class="theme-btn" onclick="document.body.classList.toggle('dark-mode')">
    <i class="fas fa-moon"></i>
</div>

</body>
</html>
