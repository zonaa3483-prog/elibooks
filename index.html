<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>7/24 Sinxron Serial Kanalı</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .tv-screen { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 5px solid red; z-index: 10; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: red; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 50px; z-index: 100; }
    </style>
</head>
<body>

<div class="tv-screen">
    <button id="startBtn">YAYIMA QOŞUL (CANLI)</button>
    <div class="info">
        <div style="color:red; font-weight:bold;">● CANLI</div>
        <div id="currentTitle">Kanal Yüklenir...</div>
    </div>
    <video id="video" playsinline></video>
</div>

<script>
    // BAZA - Bütün bölümlərin müddətini (saniyə ilə) dəqiq yazmalısan
    const baza = [
        { title: "Bölüm 1", url: "https://server.com/bolum1.mp4", duration: 1200 }, // 20 dəqiqə
        { title: "Bölüm 2", url: "https://server.com/bolum2.mp4", duration: 1200 },
        { title: "Canlı Kanal", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", duration: 3600 } // 1 saat
    ];

    const video = document.getElementById('video');
    const title = document.getElementById('currentTitle');
    const startBtn = document.getElementById('startBtn');
    const hls = new Hls();

    function getLiveState() {
        let totalDuration = baza.reduce((a, b) => a + b.duration, 0);
        let now = Math.floor(Date.now() / 1000); 
        let currentPoint = now % totalDuration; // Pleylistdəki hazırkı saniyəmiz

        let elapsed = 0;
        for (let i = 0; i < baza.length; i++) {
            if (currentPoint < elapsed + baza[i].duration) {
                return { index: i, seek: currentPoint - elapsed };
            }
            elapsed += baza[i].duration;
        }
    }

    function syncPlay() {
        const state = getLiveState();
        const item = baza[state.index];
        title.innerText = item.title;

        if (item.url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hls.loadSource(item.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.currentTime = state.seek;
                    video.play();
                });
            }
        } else {
            video.src = item.url;
            video.currentTime = state.seek;
            video.play();
        }
    }

    // Video bitəndə növbəti sinxron nöqtəyə keç
    video.onended = () => syncPlay();

    startBtn.onclick = () => {
        startBtn.style.display = 'none';
        video.muted = false;
        syncPlay();
    };

    // Hər 1 dəqiqədən bir saatı yoxla ki, yayım qaçmasın (TV məntiqi)
    setInterval(() => {
        let state = getLiveState();
        if (Math.abs(video.currentTime - state.seek) > 10) {
            syncPlay();
        }
    }, 60000);
</script>
</body>
</html>
